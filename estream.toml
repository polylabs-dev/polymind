[platform]
version = "0.22.0"
min_version = "0.22.0"

[component]
name = "qmind"
version = "0.2.0"
description = "Personal ESLM corpus and digital legacy — on-device inference, memory retrieval, classification, guardian transfer, and RBAC"

[compiler]
target = ["wasm32-wasi", "native"]
optimization = "size"
strip = true

[stratum]
default_store = "kv"
graph_store = "csr"
dag_store = "merkle_csr"

[cortex]
default_alert_channel = "mind-team"
anomaly_detection = true
drift_threshold = 0.10

[signing]
algorithm = "ml-dsa-87"
key_size = 4896
signature_size = 4627
pubkey_size = 2592

[scatter]
default_k = 3
default_n = 5
min_k = 3
max_n = 32

[telemetry]
schema_hash = "auto"
streamsight = true
blind_relay = true
cohort_min_size = 50
aggregate_window = "1h"
noise_budget = "0.5"

[testing]
test_vectors = "test_vectors/"
fuzz_targets = true
kat_vectors = true
golden_tests = true
